app = "srinakorn-games"     # ← เปลี่ยนชื่อนี้ได้ (ห้ามมีตัวอักษรซ้ำในโลก)
primary_region = "sin"      # Singapore (ใกล้ไทยมาก)

[build]
  image = "node:20"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[env]
  PORT = "3000"
  NODE_ENV = "production"
  ADMIN_PIN = "2569"         # ← เปลี่ยนเป็นรหัสที่คุณต้องการ

[[mounts]]
  source = "data_volume"
  destination = "/app/data"